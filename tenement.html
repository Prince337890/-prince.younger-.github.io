<!DOCTYPE html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Tenement — Living Diorama</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&display=swap" rel="stylesheet">
<style>
  :root{
    --accent-top:#35e0ff;--accent-mid:#ffb14d;--accent-bot:#ff7a2f;
    --ink:#e8edf2;--muted:#8a94a3;--panel:rgba(12,16,22,.6);--line:rgba(255,255,255,.10);
  }
  html,body{margin:0;height:100%;background:#05070b;overflow:hidden;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;color:var(--ink)}
  #app{position:fixed;inset:0}
  canvas{display:block}
  #vignette{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(125% 95% at 50% 40%,transparent 52%,rgba(0,0,0,.6) 100%);mix-blend-mode:multiply}
  #frameline{position:fixed;inset:18px;pointer-events:none;border:1px solid rgba(255,255,255,.06)}
  .panel{position:fixed;backdrop-filter:blur(10px);background:var(--panel);border:1px solid var(--line);border-radius:12px}
  #hud{left:24px;bottom:24px;padding:16px 18px 14px;width:188px;display:flex;flex-direction:column;align-items:center}
  #dial{display:block;overflow:visible}
  #time{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:40px;line-height:.9;margin-top:8px;letter-spacing:.01em}
  #time small{font-size:16px;color:var(--muted);margin-left:6px;letter-spacing:.2em}
  #daylabel{font-size:9px;letter-spacing:.36em;text-transform:uppercase;color:var(--muted);margin:7px 0 13px}
  .ctl{display:flex;align-items:center;gap:10px;width:100%}
  #play{appearance:none;border:1px solid var(--line);background:transparent;color:var(--ink);
    font:inherit;font-size:10px;letter-spacing:.14em;padding:6px 10px;border-radius:6px;cursor:pointer}
  #play:hover{border-color:rgba(255,255,255,.32)}
  input[type=range]{-webkit-appearance:none;appearance:none;height:2px;background:var(--line);border-radius:2px;flex:1;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--ink);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:11px;height:11px;border-radius:50%;background:var(--ink);border:none;cursor:pointer}
  .ctl label{font-size:9px;color:var(--muted);letter-spacing:.18em}
  #legend{left:24px;top:24px;padding:13px 15px}
  #legend h1{font-size:10px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;font-weight:500;margin:0 0 12px}
  .floor{display:grid;grid-template-columns:10px 1fr;gap:10px;align-items:start;margin:11px 0}
  .swatch{width:10px;height:10px;margin-top:3px;border-radius:2px;box-shadow:0 0 10px currentColor}
  .floor .name{font-size:12px;letter-spacing:.08em}
  .floor .state{font-size:10px;color:var(--muted);letter-spacing:.05em;margin-top:2px}
  .t .swatch,.t .name{color:var(--accent-top)}.m .swatch,.m .name{color:var(--accent-mid)}.b .swatch,.b .name{color:var(--accent-bot)}
  #hint{right:24px;bottom:24px;color:var(--muted);font-size:10px;letter-spacing:.12em;text-align:right;line-height:1.7}
</style>

<div id="app"></div><div id="vignette"></div><div id="frameline"></div>
<div id="legend" class="panel">
  <h1>The Tenement · cutaway feed</h1>
  <div class="floor t"><span class="swatch">█</span><div><div class="name">03 — THE CAPSULE</div><div class="state" id="s2">—</div></div></div>
  <div class="floor m"><span class="swatch">█</span><div><div class="name">02 — THE GREENHOUSE</div><div class="state" id="s1">—</div></div></div>
  <div class="floor b"><span class="swatch">█</span><div><div class="name">01 — THE WORKSHOP</div><div class="state" id="s0">—</div></div></div>
</div>
<div id="hud" class="panel">
  <svg id="dial" viewBox="0 0 120 120" width="124" height="124"></svg>
  <div id="time">6:00<small>AM</small></div><div id="daylabel">dawn</div>
  <div class="ctl"><button id="play">⏸ PAUSE</button><label>SPD</label><input id="speed" type="range" min="0.2" max="8" step="0.2" value="2.2"></div>
</div>
<div id="hint" class="panel" style="padding:8px 12px">drag · orbit&nbsp;&nbsp;|&nbsp;&nbsp;scroll · dolly</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const TAU=Math.PI*2,PI=Math.PI;
const lerp=(a,b,t)=>a+(b-a)*t,clamp=(v,a,b)=>Math.min(b,Math.max(a,v));

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;renderer.toneMapping=THREE.ACESFilmicToneMapping;
document.getElementById('app').appendChild(renderer.domElement);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(34,innerWidth/innerHeight,0.1,300);
const target=new THREE.Vector3(0,4.6,0);
let radius=31,theta=0.58,phi=1.12;
function applyCam(){camera.position.set(target.x+radius*Math.sin(phi)*Math.sin(theta),target.y+radius*Math.cos(phi),target.z+radius*Math.sin(phi)*Math.cos(theta));camera.lookAt(target);}
applyCam();
let drag=false,px=0,py=0;
renderer.domElement.addEventListener('pointerdown',e=>{drag=true;px=e.clientX;py=e.clientY;});
addEventListener('pointerup',()=>drag=false);
addEventListener('pointermove',e=>{if(!drag)return;theta-=(e.clientX-px)*0.005;phi=clamp(phi-(e.clientY-py)*0.005,0.22,1.45);px=e.clientX;py=e.clientY;applyCam();});
renderer.domElement.addEventListener('wheel',e=>{e.preventDefault();radius=clamp(radius+e.deltaY*0.02,16,52);applyCam();},{passive:false});

// ================= PROCEDURAL TEXTURE LIBRARY =================
function makeTex(draw,w=256,h=256,rep=[1,1]){
  const c=document.createElement('canvas');c.width=w;c.height=h;
  draw(c.getContext('2d'),w,h);
  const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(rep[0],rep[1]);
  t.anisotropy=8;t.needsUpdate=true;return t;
}
function speckle(x,w,h,n,a){for(let i=0;i<n;i++){const v=Math.random()*255|0;x.fillStyle=`rgba(${v},${v},${v},${a})`;x.fillRect(Math.random()*w,Math.random()*h,1,1);}}
function woodTex(base,grain,rep){return makeTex((x,w,h)=>{
  x.fillStyle=base;x.fillRect(0,0,w,h);
  const planks=5,pw=h/planks;
  for(let p=0;p<=planks;p++){x.strokeStyle='rgba(0,0,0,0.22)';x.lineWidth=1.5;x.beginPath();x.moveTo(0,p*pw);x.lineTo(w,p*pw);x.stroke();}
  for(let i=0;i<80;i++){x.strokeStyle=`rgba(${grain},${(0.03+Math.random()*0.08).toFixed(2)})`;x.lineWidth=Math.random()*1.5;
    const y=Math.random()*h;x.beginPath();x.moveTo(0,y);x.bezierCurveTo(w*.33,y+(Math.random()*5-2.5),w*.66,y+(Math.random()*5-2.5),w,y+(Math.random()*5-2.5));x.stroke();}
  speckle(x,w,h,w*h*0.05,0.04);
},256,256,rep);}
function plasterTex(base,rep){return makeTex((x,w,h)=>{
  x.fillStyle=base;x.fillRect(0,0,w,h);
  for(let i=0;i<46;i++){const gx=Math.random()*w,gy=Math.random()*h,r=12+Math.random()*34,d=Math.random()<.5;
    const g=x.createRadialGradient(gx,gy,0,gx,gy,r);
    g.addColorStop(0,`rgba(${d?255:70},${d?245:70},${d?225:70},0.05)`);g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g;x.fillRect(gx-r,gy-r,r*2,r*2);}
  speckle(x,w,h,w*h*0.03,0.03);
},256,256,rep);}
function fabricTex(base,rep){return makeTex((x,w,h)=>{
  x.fillStyle=base;x.fillRect(0,0,w,h);
  for(let i=0;i<w;i+=3){x.strokeStyle='rgba(0,0,0,0.06)';x.beginPath();x.moveTo(i,0);x.lineTo(i,h);x.stroke();
    x.strokeStyle='rgba(255,255,255,0.05)';x.beginPath();x.moveTo(i+1.5,0);x.lineTo(i+1.5,h);x.stroke();}
  for(let j=0;j<h;j+=3){x.strokeStyle='rgba(0,0,0,0.05)';x.beginPath();x.moveTo(0,j);x.lineTo(w,j);x.stroke();}
  speckle(x,w,h,w*h*0.02,0.03);
},128,128,rep);}
function stoneTex(base,rep){return makeTex((x,w,h)=>{
  x.fillStyle=base;x.fillRect(0,0,w,h);
  for(let i=0;i<2200;i++){const v=160+Math.random()*95|0,a=Math.random()*0.06;
    x.fillStyle=Math.random()<.5?`rgba(${v},${v},${v},${a})`:`rgba(0,0,0,${a})`;
    x.fillRect(Math.random()*w,Math.random()*h,Math.random()*2.4,Math.random()*2.4);}
},256,256,rep);}
function tileTex(tile,grout,rep){return makeTex((x,w,h)=>{
  x.fillStyle=grout;x.fillRect(0,0,w,h);const n=4,s=w/n;
  for(let i=0;i<n;i++)for(let j=0;j<n;j++){x.fillStyle=tile;x.fillRect(i*s+2,j*s+2,s-4,s-4);
    x.fillStyle=`rgba(255,255,255,${(Math.random()*0.05).toFixed(3)})`;x.fillRect(i*s+2,j*s+2,s-4,s-4);}
},128,128,rep);}
function rugTex(base,accent,rep){return makeTex((x,w,h)=>{
  x.fillStyle=base;x.fillRect(0,0,w,h);
  x.strokeStyle=accent;x.lineWidth=h*0.06;x.strokeRect(h*0.07,h*0.07,w-h*0.14,h-h*0.14);
  for(let i=0;i<6;i++){x.strokeStyle=i%2?accent:'rgba(255,255,255,0.12)';x.lineWidth=2;
    const y=h*0.22+i*(h*0.1);x.beginPath();x.moveTo(w*0.18,y);x.lineTo(w*0.82,y);x.stroke();}
  speckle(x,w,h,w*h*0.04,0.05);
},128,128,rep);}
function artTex(){const pal=[['#c46a4a','#e0a96d','#3d5a6c'],['#6b8e7a','#d4a24e','#8a4f3a'],['#46527d','#cf6b8a','#e8d2a8']];
  const p=pal[Math.random()*pal.length|0];
  return makeTex((x,w,h)=>{x.fillStyle='#efe7d8';x.fillRect(0,0,w,h);
    for(let i=0;i<5;i++){x.fillStyle=p[i%p.length];x.globalAlpha=0.85;
      x.beginPath();x.ellipse(Math.random()*w,Math.random()*h,10+Math.random()*40,10+Math.random()*40,Math.random()*PI,0,TAU);x.fill();}
    x.globalAlpha=1;},128,128);}

// shared materials
const WALL=plasterTex('#efe5d4',[3.2,1.5]);
function wallMat(){return new THREE.MeshStandardMaterial({map:WALL,roughness:.96,metalness:0});}
const blobTex=makeTex((x,w,h)=>{const g=x.createRadialGradient(w/2,h/2,0,w/2,h/2,w/2);
  g.addColorStop(0,'rgba(0,0,0,0.45)');g.addColorStop(.55,'rgba(0,0,0,0.2)');g.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=g;x.fillRect(0,0,w,h);},128,128);
const blobMat=new THREE.MeshBasicMaterial({map:blobTex,transparent:true,depthWrite:false});

// ================= atmosphere / celestial =================
const hemi=new THREE.HemisphereLight(0xcfe0ff,0x2a2620,0);scene.add(hemi);
const key=new THREE.DirectionalLight(0xffffff,0);key.castShadow=true;key.shadow.mapSize.set(2048,2048);
Object.assign(key.shadow.camera,{left:-18,right:18,top:20,bottom:-4,near:1,far:90});key.shadow.bias=-0.0004;
scene.add(key,key.target);key.target.position.set(0,4,0);
function ball(r,m,s=20){return new THREE.Mesh(new THREE.SphereGeometry(r,s,Math.max(8,s/2)),m);}
const sunMesh=ball(1.7,new THREE.MeshBasicMaterial({color:0xffe08a}),24);
sunMesh.add(ball(3.4,new THREE.MeshBasicMaterial({color:0xffcf6b,transparent:true,opacity:.22}),20));scene.add(sunMesh);
const moonMesh=ball(1.2,new THREE.MeshBasicMaterial({color:0xd8e2ff}),24);
moonMesh.add(ball(2.4,new THREE.MeshBasicMaterial({color:0x9fb6ff,transparent:true,opacity:.18}),20));scene.add(moonMesh);
const starGeo=new THREE.BufferGeometry(),sv=[];
for(let i=0;i<360;i++){const a=Math.random()*TAU,e=Math.random()*PI*0.5,r=70;sv.push(Math.cos(a)*Math.cos(e)*r,Math.sin(e)*r+4,Math.sin(a)*Math.cos(e)*r);}
starGeo.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
const starMat=new THREE.PointsMaterial({color:0xffffff,size:.32,transparent:true,opacity:0});scene.add(new THREE.Points(starGeo,starMat));

// ================= build kit =================
const FW=11,FD=6,FH=3.2,WT=0.18,X0=-FW/2,X1=FW/2,ZB=-FD/2,ZF=FD/2;
const BED_X=-3.85,LIV_X=0,KIT_X=3.85,PX1=-2.1,PX2=2.1;
function box(w,h,d,m){return new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);}
function cyl(rt,rb,h,s,m){return new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s),m);}
function mat(c,o={}){return new THREE.MeshStandardMaterial(Object.assign({color:c,roughness:.85,metalness:.05},o));}
function emiss(c,i=1){return new THREE.MeshStandardMaterial({color:0x05070a,emissive:c,emissiveIntensity:i,roughness:.4});}
function blob(g,x,z,r){const p=new THREE.Mesh(new THREE.PlaneGeometry(r,r),blobMat);p.rotation.x=-PI/2;p.position.set(x,.014,z);g.add(p);}

// soft furnishings & furniture
function fBed(g,x,z,frameM,duvetM,pillowM){const G=new THREE.Group();G.position.set(x,0,z);blob(G,0,.1,2.6);
  const f=box(1.55,.3,2.05,frameM);f.position.y=.18;f.castShadow=f.receiveShadow=true;G.add(f);
  const m=box(1.42,.16,1.92,duvetM);m.position.y=.4;G.add(m);
  const duv=ball(1,duvetM,18);duv.scale.set(.72,.17,.98);duv.position.set(0,.5,.18);duv.castShadow=true;G.add(duv);
  const head=box(1.55,.55,.12,frameM);head.position.set(0,.46,-1.0);head.castShadow=true;G.add(head);
  [-.32,.32].forEach(pp=>{const p=ball(.34,pillowM,16);p.scale.set(.56,.22,.34);p.position.set(pp,.55,-.72);p.castShadow=true;G.add(p);});
  g.add(G);}
function fArmchair(g,x,z,fab,frame,rot=0){const G=new THREE.Group();G.position.set(x,0,z);G.rotation.y=rot;blob(G,0,0,1.6);
  const base=box(.95,.4,.9,frame);base.position.y=.3;base.castShadow=base.receiveShadow=true;G.add(base);
  const cush=ball(.5,fab,16);cush.scale.set(.42,.18,.42);cush.position.set(0,.52,.04);cush.castShadow=true;G.add(cush);
  const back=box(.95,.65,.18,fab);back.position.set(0,.72,-.36);back.castShadow=true;G.add(back);
  [-.42,.42].forEach(ax=>{const a=box(.16,.5,.85,fab);a.position.set(ax,.5,0);a.castShadow=true;G.add(a);});
  g.add(G);}
function fSofa(g,x,z,fab,rot=0){const G=new THREE.Group();G.position.set(x,0,z);G.rotation.y=rot;blob(G,0,0,2.6);
  const base=box(2.0,.38,.9,fab);base.position.y=.3;base.castShadow=base.receiveShadow=true;G.add(base);
  [-.5,.5].forEach(cx=>{const c=ball(.5,fab,16);c.scale.set(.46,.17,.42);c.position.set(cx,.5,.03);c.castShadow=true;G.add(c);
    const b=box(.92,.5,.2,fab);b.position.set(cx,.62,-.33);b.castShadow=true;G.add(b);});
  [-.95,.95].forEach(ax=>{const a=box(.16,.52,.9,fab);a.position.set(ax,.5,0);a.castShadow=true;G.add(a);});
  g.add(G);}
function fRug(g,x,z,w,d,texM){const r=box(w,.025,d,texM);r.position.set(x,.018,z);r.receiveShadow=true;g.add(r);}
function fTable(g,x,z,w,d,m){const G=new THREE.Group();G.position.set(x,0,z);blob(G,0,0,Math.max(w,d)*1.3);
  const t=box(w,.07,d,m);t.position.y=.74;t.castShadow=t.receiveShadow=true;G.add(t);
  [[-(w/2-.1),-(d/2-.1)],[(w/2-.1),-(d/2-.1)],[-(w/2-.1),(d/2-.1)],[(w/2-.1),(d/2-.1)]].forEach(p=>{const l=box(.07,.74,.07,m);l.position.set(p[0],.37,p[1]);G.add(l);});g.add(G);}
function fCounter(g,x,z,w,bodyM,topM){const G=new THREE.Group();G.position.set(x,0,z);blob(G,0,0,w*0.9);
  const b=box(w,.82,.66,bodyM);b.position.y=.41;b.castShadow=b.receiveShadow=true;G.add(b);
  // cabinet door seams
  const seamN=Math.round(w/0.6);for(let i=1;i<seamN;i++){const s=box(.012,.6,.01,mat(0x000000,{roughness:1}));s.position.set(-w/2+i*(w/seamN),.42,.34);s.material.opacity=.25;s.material.transparent=true;G.add(s);}
  const t=box(w+.06,.07,.72,topM);t.position.y=.85;t.castShadow=true;G.add(t);g.add(G);}
function fFridge(g,x,z,m){const f=box(.8,1.7,.78,m);f.position.set(x,.85,z);f.castShadow=f.receiveShadow=true;g.add(f);blob(g,x,z,1.2);
  const h=box(.04,.5,.05,mat(0x2a2a2a,{metalness:.6,roughness:.4}));h.position.set(x+.36,1.05,z+.4);g.add(h);
  const seam=box(.78,.02,.02,mat(0x000,{roughness:1}));seam.position.set(x,1.0,z+.39);seam.material.transparent=true;seam.material.opacity=.3;g.add(seam);}
function fShelf(g,x,z,m,books){const G=new THREE.Group();G.position.set(x,0,z);blob(G,0,.2,1.6);
  const fr=box(1.4,2.2,.4,m);fr.position.y=1.1;fr.castShadow=fr.receiveShadow=true;G.add(fr);
  for(let s=0;s<3;s++){const sh=box(1.32,.04,.36,m);sh.position.set(0,.55+s*.6+.18,0);G.add(sh);
    for(let b=0;b<6;b++){const k=box(.14,.28+Math.random()*.1,.26,mat(books[(s*6+b)%books.length]));k.position.set(-.55+b*.2,.55+s*.6+.16,.14);k.castShadow=true;G.add(k);}}g.add(G);}
function fPlant(g,x,z,s){const G=new THREE.Group();G.position.set(x,0,z);blob(G,0,0,0.9*s);
  const pot=cyl(.2*s,.16*s,.34*s,14,mat(0xb5623a,{roughness:.8}));pot.position.y=.17*s;pot.castShadow=true;G.add(pot);
  const greens=[0x4f7a3a,0x5f8c46,0x436a32,0x6b9a52];
  for(let i=0;i<5;i++){const lf=ball(.2*s+Math.random()*.12*s,mat(greens[i%greens.length],{roughness:.9}),10);
    lf.position.set((Math.random()-.5)*.4*s,.45*s+Math.random()*.5*s,(Math.random()-.5)*.4*s);lf.scale.y=1.3;lf.castShadow=true;G.add(lf);}g.add(G);}
function fLampPole(g,x,z,glow){const G=new THREE.Group();G.position.set(x,0,z);blob(G,0,0,.7);
  const pole=cyl(.03,.04,1.5,8,mat(0x3a3a3a,{metalness:.5,roughness:.5}));pole.position.y=.75;G.add(pole);
  const sh=new THREE.Mesh(new THREE.ConeGeometry(.28,.36,18,1,true),emiss(glow,1.4));sh.position.y=1.55;G.add(sh);g.add(G);}
function fArt(g,x,y,z){const fr=box(.86,.62,.05,mat(0x2c2620,{roughness:.6}));fr.position.set(x,y,z);g.add(fr);
  const c=box(.74,.5,.02,new THREE.MeshStandardMaterial({map:artTex(),roughness:.7}));c.position.set(x,y,z+.03);g.add(c);}
function fDeskMonitors(g,x,z){const G=new THREE.Group();G.position.set(x,0,z);blob(G,0,0,2.2);
  const dm=mat(0x14171c,{roughness:.4,metalness:.2});
  const t=box(2.2,.07,.8,dm);t.position.y=.95;t.castShadow=true;G.add(t);
  [[-1,-.3],[1,-.3]].forEach(p=>{const l=box(.07,.95,.07,mat(0x202833,{metalness:.5}));l.position.set(p[0],.47,p[1]);G.add(l);});
  const m1=box(1,.58,.05,emiss(0x35e0ff,1.5));m1.position.set(-.55,1.55,-.32);G.add(m1);
  const m2=box(1,.58,.05,emiss(0xff2bd6,1.3));m2.position.set(.55,1.55,-.32);G.add(m2);
  const ch=box(.6,1,.6,mat(0x0c0e12,{roughness:.5}));ch.position.set(0,.5,.55);ch.castShadow=true;G.add(ch);g.add(G);}
function fWorkbench(g,x,z){const G=new THREE.Group();G.position.set(x,0,z);blob(G,0,0,2.4);
  const wood=new THREE.MeshStandardMaterial({map:woodTex('#6b4a2f','70,46,24',[2,1]),roughness:.9});
  const steel=mat(0x9aa0a6,{metalness:.6,roughness:.4});
  const b=box(2.2,.9,.8,wood);b.position.y=.45;b.castShadow=b.receiveShadow=true;G.add(b);

// ================= assemble =================
const SPOT={bed:new THREE.Vector3(BED_X,0,-.3),kitchen:new THREE.Vector3(KIT_X,0,-1),living:new THREE.Vector3(LIV_X-.3,0,.8)};

  const b=cyl(.15,.22,.5,16,mat(c,{roughness:.8}));b.position.y=.25;b.castShadow=true;G.add(b);
  const h=ball(.28,mat(0xffe0bd,{roughness:.6}),24);h.position.y=.75;h.castShadow=true;G.add(h);
  const hm=mat(0xffe0bd,{roughness:.6});[-.25,.25].forEach(sx=>{const hd=ball(.08,hm,12);hd.position.set(sx,.35,.12);hd.castShadow=true;G.add(hd);});
  const sb=new THREE.Mesh(new THREE.PlaneGeometry(.9,.9),blobMat);sb.rotation.x=-PI/2;sb.position.y=.015;G.add(sb);
  return G;}
const themes=[workshop,greenhouse,capsule],cols=[0xff7a2f,0xffb14d,0x35e0ff],npcs=[];
themes.forEach((t,i)=>{buildFloor(i,t);const n=npcFig(cols[i]);n.position.copy(SPOT.living);n.position.y=i*FH;scene.add(n);
  npcs.push({grp:n,theme:t,level:i,cur:SPOT.living.clone(),heading:0,bob:0});});
const baseSlab=box(FW+1.4,.5,FD+1.4,new THREE.MeshStandardMaterial({map:stoneTex('#cf9d7f',[3,2]),roughness:.92}));
baseSlab.position.set(0,-.27,0);baseSlab.receiveShadow=true;scene.add(baseSlab);

// ================= artistic dial =================
const NS='http://www.w3.org/2000/svg',dial=document.getElementById('dial'),CX=60,CY=60,R=46;
const polar=(r,deg)=>{const a=deg*PI/180;return[CX+r*Math.sin(a),CY-r*Math.cos(a)];};
function se(tag,a){const e=document.createElementNS(NS,tag);for(const k in a)e.setAttribute(k,a[k]);return e;}
function arc(d0,d1,col){const[a,b]=polar(R,d0),[c,d]=polar(R,d1);return se('path',{d:`M ${a} ${b} A ${R} ${R} 0 0 1 ${c} ${d}`,fill:'none',stroke:col,'stroke-width':2,'stroke-linecap':'round',opacity:.55});}
dial.appendChild(arc(-90,90,'#caa05a'));dial.appendChild(arc(90,270,'#46527d'));
for(let h=0;h<24;h++){const deg=((h-12)/24)*360,M=h%6===0,[ix,iy]=polar(R-(M?7:3),deg),[ox,oy]=polar(R,deg);
  dial.appendChild(se('line',{x1:ix,y1:iy,x2:ox,y2:oy,stroke:'rgba(255,255,255,.35)','stroke-width':M?1.4:.7}));}
const[sgx,sgy]=polar(R-13,0),[mgx,mgy]=polar(R-13,180);
const sgl=se('text',{x:sgx,y:sgy+3.5,'text-anchor':'middle','font-size':9,fill:'#ffcf6b'});sgl.textContent='☀';dial.appendChild(sgl);
const mgl=se('text',{x:mgx,y:mgy+3.5,'text-anchor':'middle','font-size':8,fill:'#9fb6ff'});mgl.textContent='☾';dial.appendChild(mgl);
const hand=se('line',{x1:CX,y1:CY,x2:CX,y2:CY-(R-12),stroke:'#e8edf2','stroke-width':1.6,'stroke-linecap':'round'});dial.appendChild(hand);
const bead=se('circle',{cx:CX,cy:CY-(R-12),r:3.4,fill:'#ffcf6b'});dial.appendChild(bead);
dial.appendChild(se('circle',{cx:CX,cy:CY,r:2.2,fill:'#e8edf2'}));

// ================= clock + loop =================
let hour=6,playing=true,speed=2.2;
const $time=document.getElementById('time'),$day=document.getElementById('daylabel');
const sTxt=[document.getElementById('s0'),document.getElementById('s1'),document.getElementById('s2')];
document.getElementById('speed').addEventListener('input',e=>speed=+e.target.value);
document.getElementById('play').addEventListener('click',e=>{playing=!playing;e.target.textContent=playing?'⏸ PAUSE':'▶ PLAY';});
const ROOM={bed:'in the bedroom',kitchen:'in the kitchen',living:'in the living room',out:'away · out'},ROOM_C={bed:'asleep (daylight)',living:'at the desk'};
function phase(h){if(h>=5&&h<8)return'dawn';if(h<17)return'day';if(h<20)return'dusk';return'night';}
const cNight=new THREE.Color(0x070b14),cDay=new THREE.Color(0x6ca5e8),cDusk=new THREE.Color(0xc0623a),tmp=new THREE.Vector3(),clk=new THREE.Clock();
function tick(){const dt=clk.getDelta();if(playing)hour=(hour+dt*speed)%24;
  const sunUp=hour>=6&&hour<18;let dl=0;
  if(sunUp){const a=((hour-6)/12)*PI;sunMesh.position.set(Math.cos(a)*24,Math.sin(a)*16+1,10);dl=Math.max(0,Math.sin(a));}
  sunMesh.visible=sunUp;
  const moonUp=!sunUp;let mel=0;
  if(moonUp){const tm=hour>=18?(hour-18)/12:(hour+6)/12,a=tm*PI;moonMesh.position.set(Math.cos(a)*24,Math.sin(a)*16+1,10);mel=Math.max(0,Math.sin(a));}
  moonMesh.visible=moonUp;
  if(sunUp){key.position.copy(sunMesh.position);key.color.setHSL(lerp(.05,.12,dl),.55,.55);key.intensity=dl*2.7;}
  else{key.position.copy(moonMesh.position);key.color.set(0x9fb6ff);key.intensity=mel*.4;}
  key.target.updateMatrixWorld();hemi.intensity=.06+dl*.4;
  const sky=cNight.clone().lerp(cDay,dl);if(sunUp)sky.lerp(cDusk,clamp(1-dl/.4,0,1)*.45);scene.background=sky;
  starMat.opacity=clamp(1-dl*1.6,0,1)*.9;renderer.toneMappingExposure=lerp(.9,1.08,dl);
  npcs.forEach((n,i)=>{const place=n.theme.schedule(hour);
    if(place==='out'){n.grp.visible=false;sTxt[i].textContent='— '+ROOM.out;return;}
    n.grp.visible=true;tmp.copy(SPOT[place]);tmp.y=n.level*FH;
    const dx=tmp.x-n.cur.x,dz=tmp.z-n.cur.z,far=Math.hypot(dx,dz),moving=playing&&far>.05;
    n.cur.lerp(tmp,clamp(dt*2.2,0,1));
    if(moving)n.heading=Math.atan2(dx,dz);let turn=n.heading-n.grp.rotation.y;turn=Math.atan2(Math.sin(turn),Math.cos(turn));n.grp.rotation.y+=turn*clamp(dt*8,0,1);
    n.bob=moving?n.bob+dt*9:0;const hop=moving?Math.abs(Math.sin(n.bob))*.12:0;n.grp.position.set(n.cur.x,n.cur.y+hop,n.cur.z);
    sTxt[i].textContent='· '+((i===2&&ROOM_C[place])?ROOM_C[place]:ROOM[place]);});
  const deg=((hour-12)/24)*360,[hx,hy]=polar(R-12,deg);
  hand.setAttribute('x2',hx);hand.setAttribute('y2',hy);bead.setAttribute('cx',hx);bead.setAttribute('cy',hy);bead.setAttribute('fill',sunUp?'#ffcf6b':'#9fb6ff');
  const hh=Math.floor(hour),mm=Math.floor((hour-hh)*60),ap=hh<12?'AM':'PM',h12=(hh%12)||12;
  $time.innerHTML=`${h12}:${String(mm).padStart(2,'0')}<small>${ap}</small>`;$day.textContent=phase(hour);
  renderer.render(scene,camera);requestAnimationFrame(tick);
}
tick();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
renderer.setSize(innerWidth,innerHeight);
</script>
